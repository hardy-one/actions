name: Build LobeChat (Docker + Windows)

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker tag'
        required: false
        type: string
        default: 'latest'
      
      version:
        description: 'Version number'
        required: false
        type: string

env:
  NODE_VERSION: '24.11.1'
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/lobehub
  SOURCE_REPO: hardy-one/lobehub
  SOURCE_BRANCH: next

jobs:
  calculate-version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    
    steps:
      - name: Use manual version
        if: ${{ inputs.version != '' && inputs.version != null }}
        id: version_manual
        run: |
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          echo "tag=v${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Get latest tag via GitHub API
        if: ${{ inputs.version == '' || inputs.version == null }}
        id: version_auto
        run: |
          response=$(curl -s "https://api.github.com/repos/${{ env.SOURCE_REPO }}/tags?per_page=100")
          latest_tag=$(echo "$response" | grep -oE '"name":\s*"v[0-9]+\.[0-9]+\.[0-9]+"' | head -1 | sed 's/.*"v\([0-9.]*\)".*/v\1/')
          
          if [ -z "$latest_tag" ]; then
            version="$(date +%Y.%m.%d).${{ github.run_number }}"
          else
            base_version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$base_version"
            new_patch=$((patch + 1))
            version="${major}.${minor}.${new_patch}"
          fi
          
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "tag=v${version}" >> $GITHUB_OUTPUT

      - name: Set version output
        id: version
        run: |
          if [ -n "${{ steps.version_manual.outputs.version }}" ]; then
            echo "version=${{ steps.version_manual.outputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=${{ steps.version_manual.outputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ steps.version_auto.outputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=${{ steps.version_auto.outputs.tag }}" >> $GITHUB_OUTPUT
          fi

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [calculate-version]
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_ENABLE_BETTER_AUTH=1
            NEXT_PUBLIC_ENABLE_NEXT_AUTH=0
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.docker_tag }}
            ${{ env.IMAGE_NAME }}:${{ needs.calculate-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-windows:
    name: Build Windows Desktop
    runs-on: windows-2025
    needs: [calculate-version]
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --node-linker=hoisted

      - name: Remove China electron mirror
        shell: bash
        run: |
          if [ -f "./apps/desktop/.npmrc" ]; then
            sed -i.bak '/^electron_mirror=/d; /^electron_builder_binaries_mirror=/d' "./apps/desktop/.npmrc"
            rm -f "./apps/desktop/.npmrc.bak"
          fi

      - name: Install deps on Desktop
        run: npm run install-isolated --prefix=./apps/desktop

      - name: Set package version
        run: npm run workflow:set-desktop-version ${{ needs.calculate-version.outputs.version }} canary

      # ✅ 修复：只清理 dist，不清理 release
      - name: Clean previous build artifacts
        shell: pwsh
        run: |
          # 只清理 dist 目录（构建临时文件）
          Remove-Item -Path dist -Recurse -Force -ErrorAction SilentlyContinue
          
          # 清理 C:\temp
          Remove-Item -Path C:\temp -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -Path C:\temp -ItemType Directory -Force
          
          Write-Host "✅ 已清理 dist 和 C:\temp"
          Write-Host "ℹ️ release 目录保留（如果有旧版本）"
        env:
          TEMP: C:\temp
          TMP: C:\temp

      - name: Build Windows App
        run: npm run desktop:package:app
        env:
          UPDATE_CHANNEL: canary
          UPDATE_SERVER_URL: ${{ secrets.UPDATE_SERVER_URL }}
          APP_URL: http://localhost:3015
          DATABASE_URL: 'postgresql://postgres@localhost:5432/postgres'
          KEY_VAULTS_SECRET: 'oLXWIiR/AKF+rWaqy9lHkrYgzpATbW3CtJp3UfkVgpE='
          NEXT_PUBLIC_DESKTOP_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_DESKTOP_PROJECT_ID }}
          NEXT_PUBLIC_DESKTOP_UMAMI_BASE_URL: ${{ secrets.NEXT_PUBLIC_DESKTOP_UMAMI_BASE_URL }}
          TEMP: C:\temp
          TMP: C:\temp

      # 🔍 诊断：查找所有 exe 文件
      - name: Find all executables
        shell: pwsh
        run: |
          Write-Host "============================================================"
          Write-Host "  搜索所有构建产物..."
          Write-Host "============================================================"
          
          Write-Host ""
          Write-Host "=== 当前目录结构 ==="
          Get-ChildItem -Force | Select-Object Name, PSIsContainer | Format-Table
        
          Write-Host ""
          Write-Host "=== release 目录（如果有）==="
          if (Test-Path release) {
            Get-ChildItem -Path release -File | Select-Object Name, Length | Format-Table
          } else {
            Write-Host "❌ release 目录不存在"
          }
          
          Write-Host ""
          Write-Host "=== dist 目录（如果有）==="
          if (Test-Path dist) {
            Get-ChildItem -Path dist -Recurse -File -Filter *.exe | Select-Object FullName, Length | Format-Table
          } else {
            Write-Host "❌ dist 目录不存在"
          }
          
          Write-Host ""
          Write-Host "=== 所有 *-setup.exe 文件 ==="
          $setupFiles = Get-ChildItem -Path . -Filter "*-setup.exe" -Recurse -ErrorAction SilentlyContinue
          if ($setupFiles) {
            $setupFiles | Select-Object FullName, Length | Format-Table
          } else {
            Write-Host "❌ 未找到 *-setup.exe 文件"
          }
          
          Write-Host "============================================================"

      # 🔍 查找主安装程序（搜索所有目录）
      - name: Find setup executable
        id: setup_file
        shell: pwsh
        run: |
          Write-Host "============================================================"
          Write-Host "  查找主安装程序..."
          Write-Host "============================================================"
          
          # 在所有目录中查找 *-setup.exe 文件
          $setupFile = Get-ChildItem -Path . -Filter "*-setup.exe" -Recurse -File | 
            Where-Object { $_.Name -notlike "*__uninstaller*" } |
            Select-Object -First 1
          
          if ($setupFile) {
            Write-Host "✅ 找到主安装程序：$($setupFile.Name)"
            Write-Host "   完整路径：$($setupFile.FullName)"
            Write-Host "   文件大小：$([math]::Round($setupFile.Length / 1MB, 2)) MB"
            
            # 复制文件到根目录 release 文件夹
            $releaseDir = Join-Path $PWD "release"
            if (-not (Test-Path $releaseDir)) {
              New-Item -Path $releaseDir -ItemType Directory -Force | Out-Null
            }
            $destPath = Join-Path $releaseDir $setupFile.Name
            Copy-Item -Path $setupFile.FullName -Destination $destPath -Force
            Write-Host "✅ 已复制到：$destPath"
            
            echo "filename=$($setupFile.Name)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "❌ 未找到 *-setup.exe 文件！"
            echo "filename=" >> $env:GITHUB_OUTPUT
          }
          
          Write-Host "============================================================"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: release/
          retention-days: 3

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.calculate-version.outputs.tag }}
          name: ${{ needs.calculate-version.outputs.tag }}
          body: ""
          files: release/*-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Windows build completed
        shell: pwsh
        run: |
          Write-Host "============================================================"
          Write-Host "  Windows 构建完成！"
          Write-Host "============================================================"
