name: Build LobeChat (Docker + Windows)

# ============================================
# 仅手动触发
# ============================================
on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker tag (e.g., latest, dev)'
        required: false
        type: string
        default: 'latest'
      
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

env:
  NODE_VERSION: '24.11.1'
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/lobehub

jobs:
  # ============================================================
  # Job 1: 构建 Docker 镜像
  # ============================================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          repository: hardy-one/lobehub
          ref: next
          path: lobe-chat-src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: lobe-chat-src
          file: lobe-chat-src/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_ENABLE_BETTER_AUTH=1
            NEXT_PUBLIC_ENABLE_NEXT_AUTH=0
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.docker_tag }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker build completed
        run: |
          echo "============================================================"
          echo "  🐳 Docker 构建完成！"
          echo "============================================================"
          echo "镜像标签:"
          echo " - ${{ env.IMAGE_NAME }}:${{ inputs.docker_tag }}"
          echo " - ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "============================================================"

  # ============================================================
  # Job 2: 构建 Windows 桌面应用（使用 pnpm 保证 workspace 正确）
  # ============================================================
  build-windows:
    name: Build Windows Desktop
    runs-on: windows-2025
    
    steps:
      # 1. 拉取源代码
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          repository: hardy-one/lobehub
          ref: next
          path: lobe-chat-src
          fetch-depth: 0

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3. 安装 pnpm（关键：项目是 pnpm workspace）
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 4. 安装依赖（pnpm workspace 安装）
      - name: Install dependencies
        working-directory: lobe-chat-src
        run: pnpm install --frozen-lockfile

      # 5. 设置版本号
      - name: Set package version
        working-directory: lobe-chat-src
        run: pnpm exec npm run workflow:set-desktop-version ${{ github.run_number }} canary

      # 6. Windows 构建前清理
      - name: Clean previous build artifacts (Windows)
        working-directory: lobe-chat-src
        shell: pwsh
        run: |
          Remove-Item -Path apps\desktop\release -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path apps\desktop\dist -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path C:\temp -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -Path C:\temp -ItemType Directory -Force
        env:
          TEMP: C:\temp
          TMP: C:\temp

      # 7. 构建并打包 Windows 应用（使用 pnpm 运行 workspace 脚本）
      - name: Build artifact on Windows
        working-directory: lobe-chat-src
        run: pnpm run desktop:package:app
        env:
          UPDATE_CHANNEL: canary
          UPDATE_SERVER_URL: ${{ secrets.UPDATE_SERVER_URL }}
          APP_URL: http://localhost:3015
          DATABASE_URL: 'postgresql://postgres@localhost:5432/postgres'
          KEY_VAULTS_SECRET: 'oLXWIiR/AKF+rWaqy9lHkrYgzpATbW3CtJp3UfkVgpE='
          NEXT_PUBLIC_DESKTOP_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_DESKTOP_PROJECT_ID }}
          NEXT_PUBLIC_DESKTOP_UMAMI_BASE_URL: ${{ secrets.NEXT_PUBLIC_DESKTOP_UMAMI_BASE_URL }}
          TEMP: C:\temp
          TMP: C:\temp

      # 8. 显示构建产物
      - name: List final artifacts
        working-directory: lobe-chat-src
        run: |
          echo "============================================================"
          echo "  构建产物列表"
          echo "============================================================"
          Get-ChildItem -Path apps\desktop\dist -Recurse -File -ErrorAction SilentlyContinue | Select-Object Name, Length, LastWriteTime
          Get-ChildItem -Path apps\desktop\release -Recurse -File -ErrorAction SilentlyContinue | Select-Object Name, Length, LastWriteTime
          echo "============================================================"

      # 9. 上传构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: |
            lobe-chat-src/apps/desktop/dist/
            lobe-chat-src/apps/desktop/release/
          retention-days: 3

      # 10. 创建 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: windows-${{ github.sha }}
          name: 'Windows Build ${{ github.run_number }}'
          body: |
            ## 🪟 Windows Desktop Build

            - **Commit**: ${{ github.sha }}
            - **Build Number**: ${{ github.run_number }}
            - **Branch**: ${{ github.ref_name }}

            ${{ inputs.release_notes && format('### 📝 更新说明\n{0}', inputs.release_notes) || '' }}

            ### ⚠️ 注意事项
            - 自动构建版本，仅供测试
            - 请备份数据后使用

            ### 📦 安装
            下载 `.exe` 文件运行安装
          files: |
            lobe-chat-src/apps/desktop/dist/latest*
            lobe-chat-src/apps/desktop/dist/*.exe*
            lobe-chat-src/apps/desktop/dist/*.msi
            lobe-chat-src/apps/desktop/dist/*.zip*
            lobe-chat-src/apps/desktop/release/latest*
            lobe-chat-src/apps/desktop/release/*.exe*
            lobe-chat-src/apps/desktop/release/*.msi
            lobe-chat-src/apps/desktop/release/*.zip*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 11. 构建完成输出
      - name: Windows build completed
        working-directory: lobe-chat-src
        run: |
          echo "============================================================"
          echo "  🪟 Windows 构建完成！"
          echo "============================================================"
          echo "Release 地址:"
          echo " https://github.com/${{ github.repository }}/releases"
          echo "============================================================"
